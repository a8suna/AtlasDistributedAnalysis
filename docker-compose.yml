services:

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "15672:15672"
      - "5672:5672"
    networks:
      - atlas-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 15s
      timeout: 10s
      retries: 10

  controller:
    image: atlas-distributed-analysis-controller:latest
    command: sh -c "sleep 30 && python controller.py"  # wait 30s for RabbitMQ
    networks:
      - atlas-net
    volumes:
      - results:/app/results
      - output:/app/output
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure    # restart if it fails, so it retries
        delay: 10s
        max_attempts: 10
      placement:
        constraints:
          - node.role == manager 

  worker:
    image: atlas-distributed-analysis-worker:latest
    command: python worker.py
    networks:
      - atlas-net
    volumes:
      - results:/app/results
    deploy:
      replicas: 4
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 2

networks:
  atlas-net:
    driver: overlay

volumes:
  results:
    driver: local
  output:
    driver: local